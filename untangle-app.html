<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Untangle — Think Out Loud</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0e0c;
    color: #e8e0d0;
    font-family: 'Lora', Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180,140,60,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo-icon { font-size: 28px; filter: saturate(0.8); }

  .logo-title {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 500;
    color: #e8e0d0;
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(232,224,208,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right { display: flex; gap: 10px; align-items: center; }

  button {
    cursor: pointer;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    border-radius: 20px;
    transition: all 0.2s;
  }

  #summary-btn {
    background: rgba(180,140,60,0.15);
    border: 1px solid rgba(180,140,60,0.3) !important;
    color: rgba(220,190,110,0.9);
    display: none;
  }

  #reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: rgba(232,224,208,0.4);
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    position: relative;
    z-index: 1;
  }

  #message-list {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: fadeSlideIn 0.3s ease forwards;
  }

  .message-row.user { justify-content: flex-end; }
  .message-row.assistant { justify-content: flex-start; }

  .avatar {
    font-size: 20px;
    margin-bottom: 2px;
    flex-shrink: 0;
    filter: saturate(0.7);
  }

  .bubble {
    max-width: 82%;
    padding: 14px 18px;
    border-radius: 18px;
    line-height: 1.65;
    font-size: 15px;
  }

  .bubble.user {
    background: rgba(180,140,60,0.12);
    border: 1px solid rgba(180,140,60,0.2);
    color: #e8e0d0;
    border-bottom-right-radius: 4px;
  }

  .bubble.assistant {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    color: #e0d8c8;
    border-bottom-left-radius: 4px;
    font-style: italic;
  }

  .thinking-bubble {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px !important;
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(180,140,60,0.5);
    animation: blink 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .thinking-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(232,224,208,0.3);
    letter-spacing: 0.05em;
    margin-left: 4px;
  }

  footer {
    padding: 16px 24px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e8e0d0;
    font-family: 'Lora', serif;
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    min-height: 44px;
    max-height: 120px;
  }

  textarea::placeholder { color: rgba(232,224,208,0.25); }

  #send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(180,140,60,0.25);
    border: 1px solid rgba(180,140,60,0.4) !important;
    color: rgba(220,190,110,0.9);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    transition: opacity 0.2s;
  }

  .hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(232,224,208,0.2);
    letter-spacing: 0.08em;
    text-align: center;
    margin-top: 10px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div id="bg"></div>

<header>
  <div class="header-left">
    <div class="logo-icon">🧵</div>
    <div>
      <div class="logo-title">Untangle</div>
      <div class="logo-sub">think out loud</div>
    </div>
  </div>
  <div class="header-right">
    <button id="summary-btn" onclick="requestSummary()">summarize session</button>
    <button id="reset-btn" onclick="resetSession()">new session</button>
  </div>
</header>

<main>
  <div id="message-list"></div>
</main>

<footer>
  <div class="input-wrapper">
    <textarea id="input" rows="2" placeholder="Just start talking... (Enter to send, Shift+Enter for newline)" onkeydown="handleKeyDown(event)"></textarea>
    <button id="send-btn" onclick="handleSend()">↑</button>
  </div>
  <div class="hint">Your space to think freely. No judgement. No advice unless you ask.</div>
</footer>

<script>
const SYSTEM_PROMPT = `You are a Socratic thinking partner — a warm, sharp, deeply curious companion for someone trying to think through a problem, decision, or idea.

Your role is NOT to give answers. Your role is to ask the single best question that helps the person think more clearly.

Rules:
- Ask ONE question at a time. Never two.
- Never give advice unless explicitly asked.
- Never summarize back what they said unless it adds something.
- Gently challenge assumptions.
- Be warm but intellectually rigorous.
- If they seem stuck, try a reframe: "What if the opposite were true?"
- If they seem close to a realization, hold back — let them get there.
- Occasionally name what you notice: "It sounds like there's some tension between X and Y — is that right?"
- After 6-8 exchanges, offer a session summary if they want one.

Your questions should feel like they come from a brilliant friend, not a chatbot.`;

let messages = [];
let loading = false;
let exchangeCount = 0;

const thinkingPhrases = ["Sitting with that...", "Thinking...", "Hmm...", "Considering..."];
let thinkingIdx = 0;
let thinkingTimer = null;

function init() {
  messages = [];
  exchangeCount = 0;
  addMessage("assistant", "Hey. What's tangled up in your head right now? Don't worry about framing it perfectly — just start talking.");
  document.getElementById("summary-btn").style.display = "none";
}

function addMessage(role, content) {
  messages.push({ role, content });
  renderMessage(role, content);
  scrollToBottom();
}

function renderMessage(role, content) {
  const list = document.getElementById("message-list");
  const row = document.createElement("div");
  row.className = `message-row ${role}`;

  if (role === "assistant") {
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🧵";
    row.appendChild(avatar);
  }

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}`;
  bubble.textContent = content;
  row.appendChild(bubble);

  list.appendChild(row);
}

function showThinking() {
  const list = document.getElementById("message-list");
  const row = document.createElement("div");
  row.className = "message-row assistant";
  row.id = "thinking-row";

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "🧵";
  row.appendChild(avatar);

  const bubble = document.createElement("div");
  bubble.className = "bubble assistant thinking-bubble";
  bubble.innerHTML = `<span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="thinking-text" id="thinking-text">Thinking...</span>`;
  row.appendChild(bubble);

  list.appendChild(row);
  scrollToBottom();

  thinkingTimer = setInterval(() => {
    thinkingIdx = (thinkingIdx + 1) % thinkingPhrases.length;
    const el = document.getElementById("thinking-text");
    if (el) el.textContent = thinkingPhrases[thinkingIdx];
  }, 1200);
}

function hideThinking() {
  clearInterval(thinkingTimer);
  const row = document.getElementById("thinking-row");
  if (row) row.remove();
}

function scrollToBottom() {
  setTimeout(() => {
    const main = document.querySelector("main");
    main.scrollTop = main.scrollHeight;
  }, 50);
}

async function handleSend() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || loading) return;

  loading = true;
  input.value = "";
  addMessage("user", text);
  showThinking();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({ role: m.role, content: m.content }))
      })
    });

    const data = await res.json();
    const reply = data.content?.map(b => b.text || "").join("") || "...";
    hideThinking();
    addMessage("assistant", reply);
    exchangeCount++;

    if (exchangeCount >= 6) {
      document.getElementById("summary-btn").style.display = "inline-block";
    }
  } catch (e) {
    hideThinking();
    addMessage("assistant", "Something went wrong. Try again?");
  } finally {
    loading = false;
  }
}

function handleKeyDown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function resetSession() {
  document.getElementById("message-list").innerHTML = "";
  init();
}

function requestSummary() {
  document.getElementById("input").value = "Can you summarize what I've figured out in this session?";
  handleSend();
}

init();
</script>
</body>
</html>
